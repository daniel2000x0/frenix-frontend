<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <div>
      <h1 class="text-3xl font-bold m-0">Panel de Administración</h1>
      <p class="text-color-secondary mt-2">Bienvenido al panel de control de Frenix</p>
    </div>
  </div>

  <div class="grid">
    <div class="col-12 md:col-6 lg:col-3" *ngFor="let stat of quickStats">
      <p-card [style]="{ cursor: 'pointer' }" (click)="navigate(stat.route)">
        <div class="flex flex-column align-items-center text-center">
          <i [class]="stat.icon + ' text-5xl text-primary mb-2'"></i>
          <span class="text-2xl font-bold">{{ stat.value }}</span>
          <span class="text-color-secondary">{{ stat.label }}</span>
        </div>
      </p-card>
    </div>
  </div>

  <div class="grid mt-4">
    <div class="col-12 md:col-6">
      <p-card header="Accesos Rápidos">
        <div class="flex flex-column gap-2">
          <button pButton label="Gestionar Productos" icon="pi pi-box" class="p-button-outlined" (click)="navigate('/admin/products')"></button>
          <button pButton label="Gestionar Usuarios" icon="pi pi-users" class="p-button-outlined" (click)="navigate('/admin/users/list')"></button>
          <button pButton label="Gestionar Categorías" icon="pi pi-tags" class="p-button-outlined" (click)="navigate('/admin/categories')"></button>
          <button pButton label="Ver Reportes" icon="pi pi-chart-bar" class="p-button-outlined" (click)="navigate('/admin/reports')"></button>
        </div>
      </p-card>
    </div>

    <div class="col-12 md:col-6">
      <p-card header="Información del Sistema">
        <div class="flex flex-column gap-2">
          <div class="flex justify-content-between">
            <span>Versión</span>
            <span class="font-semibold">1.0.0</span>
          </div>
          <div class="flex justify-content-between">
            <span>Entorno</span>
            <span class="font-semibold">Desarrollo</span>
          </div>
          <div class="flex justify-content-between">
            <span>Último acceso</span>
            <span class="font-semibold">{{ today }}</span>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
