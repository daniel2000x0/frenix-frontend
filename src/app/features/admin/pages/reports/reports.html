<div class="p-4">
  <h1 class="text-3xl font-bold mb-4">Reportes</h1>

  <div class="grid">
    <div class="col-12 md:col-6 lg:col-3" *ngFor="let report of reports">
      <p-card [header]="report.title">
        <div class="flex flex-column align-items-center text-center">
          <i [class]="report.icon + ' text-5xl text-primary mb-2'"></i>
          <p class="text-color-secondary">{{ report.description }}</p>
        </div>
        <ng-template pTemplate="footer">
          <button pButton label="Ver Reporte" icon="pi pi-eye" class="p-button-outlined w-full"></button>
        </ng-template>
      </p-card>
    </div>
  </div>
</div>
