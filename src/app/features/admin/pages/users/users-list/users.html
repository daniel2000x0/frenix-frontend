<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-3">
    <h1 class="text-3xl font-bold m-0">Usuarios</h1>
    <button pButton label="Nuevo Usuario" icon="pi pi-plus" (click)="createUser()"></button>
  </div>

  <p-card>
    <p-table [value]="users" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Email</th>
          <th>Estado</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.userid }}</td>
          <td>{{ user.userfirstname }}</td>
          <td>{{ user.userlastname }}</td>
          <td>{{ user.useremail }}</td>
          <td>
            <span [class]="user.userstatus ? 'text-green-500' : 'text-red-500'">
              {{ user.userstatus ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center">No hay usuarios registrados</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
