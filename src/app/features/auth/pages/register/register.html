<div class="login-container">
  <p-card header="Crear cuenta" styleClass="login-card">

    <form
      [formGroup]="registerForm"
      (ngSubmit)="register()"
      autocomplete="off"
      novalidate
      class="login-form"
    >

      <!-- NOMBRE -->
      <div class="field">
        <label for="firstName">Nombre</label>
        <input
          id="firstName"
          type="text"
          pInputText
          formControlName="firstName"
        />
        <small class="error"
          *ngIf="registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid">
          Nombre requerido
        </small>
      </div>

      <!-- APELLIDO -->
      <div class="field">
        <label for="lastName">Apellido</label>
        <input
          id="lastName"
          type="text"
          pInputText
          formControlName="lastName"
        />
        <small class="error"
          *ngIf="registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid">
          Apellido requerido
        </small>
      </div>

      <!-- EMAIL -->
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
        />
        <small class="error"
          *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          Email inválido
        </small>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
        ></p-password>
        <small class="error"
          *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          Mínimo 8 caracteres
        </small>
      </div>

      <!-- FECHA -->
      <div class="field">
        <label for="birthDate">Fecha de nacimiento</label>
        <input
          id="birthDate"
          type="date"
          pInputText
          formControlName="birthDate"
        />
        <small class="error"
          *ngIf="registerForm.get('birthDate')?.touched && registerForm.get('birthDate')?.invalid">
          Fecha requerida
        </small>
      </div>

      <!-- GÉNERO -->
      <div class="field">
        <label for="genderId">Género</label>
        <p-select
          formControlName="genderId"
          [options]="genders"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecciona género"
          appendTo="body"
        ></p-select>
        <small class="error"
          *ngIf="registerForm.get('genderId')?.touched && registerForm.get('genderId')?.invalid">
          Selecciona un género
        </small>
      </div>

      <!-- BOTÓN -->
      <button
        pButton
        type="submit"
        label="Registrarse"
        icon="pi pi-user-plus"
        class="login-btn"
        [loading]="loading"
        [disabled]="registerForm.invalid"
      ></button>

    </form>

  </p-card>
</div>
