<div class="p-4">
  <p-card header="Crear Orden">
    <form [formGroup]="orderForm" (ngSubmit)="submit()">
      <div class="grid">
        <div class="col-12">
          <h3>Información del Cliente</h3>
        </div>
        <div class="col-6">
          <label for="customername" class="block mb-1">Nombre</label>
          <input id="customername" pInputText formControlName="customername" class="w-full" />
          <small *ngIf="orderForm.get('customername')?.invalid && orderForm.get('customername')?.touched" class="text-red-500">Requerido</small>
        </div>
        <div class="col-6">
          <label for="customercountry" class="block mb-1">País (ID)</label>
          <input id="customercountry" pInputText formControlName="customercountry" class="w-full" type="number" />
          <small *ngIf="orderForm.get('customercountry')?.invalid && orderForm.get('customercountry')?.touched" class="text-red-500">Requerido</small>
        </div>
        <div class="col-6">
          <label for="customercity" class="block mb-1">Ciudad</label>
          <input id="customercity" pInputText formControlName="customercity" class="w-full" />
          <small *ngIf="orderForm.get('customercity')?.invalid && orderForm.get('customercity')?.touched" class="text-red-500">Requerido</small>
        </div>
        <div class="col-6">
          <label for="customerregion" class="block mb-1">Región</label>
          <input id="customerregion" pInputText formControlName="customerregion" class="w-full" />
        </div>
        <div class="col-6">
          <label for="customerzip" class="block mb-1">Código Postal</label>
          <input id="customerzip" pInputText formControlName="customerzip" class="w-full" />
        </div>
        <div class="col-6">
          <label for="customeraddress" class="block mb-1">Dirección</label>
          <input id="customeraddress" pInputText formControlName="customeraddress" class="w-full" />
          <small *ngIf="orderForm.get('customeraddress')?.invalid && orderForm.get('customeraddress')?.touched" class="text-red-500">Requerido</small>
        </div>
        <div class="col-6">
          <label for="customerphone" class="block mb-1">Teléfono</label>
          <input id="customerphone" pInputText formControlName="customerphone" class="w-full" />
          <small *ngIf="orderForm.get('customerphone')?.invalid && orderForm.get('customerphone')?.touched" class="text-red-500">Requerido</small>
        </div>
      </div>

      <div class="mt-4">
        <div class="flex justify-content-between align-items-center mb-3">
          <h3>Detalle de la Orden</h3>
          <p-button label="Agregar Producto" icon="pi pi-plus" (onClick)="addLineItem()" severity="info"></p-button>
        </div>

        <p-table [value]="orderDetails.controls" [tableStyle]="{ 'min-width': '50rem' }">
          <ng-template pTemplate="header">
            <tr>
              <th>Producto</th>
              <th>Nombre</th>
              <th>Cantidad</th>
              <th>Precio Unit.</th>
              <th>Dto %</th>
              <th>Total</th>
              <th>Acción</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-line let-i="rowIndex">
            <tr [formGroup]="$any(line)">
              <td>
                <p-select
                  [options]="products"
                  optionLabel="productname"
                  optionValue="productid"
                  [filter]="true"
                  formControlName="productid"
                  placeholder="Buscar..."
                  class="w-full"
                />
              </td>
              <td>
                <input pInputText formControlName="productname" class="w-full" readonly />
              </td>
              <td>
                <input pInputText formControlName="quantity" class="w-full" type="number" min="1" />
              </td>
              <td>
                <input pInputText formControlName="unitprice" class="w-full" type="number" min="0" step="0.01" />
              </td>
              <td>
                <input pInputText formControlName="discount" class="w-full" type="number" min="0" max="100" />
              </td>
              <td class="font-bold">${{ getLineTotal(i) | number:'1.2-2' }}</td>
              <td>
                <p-button icon="pi pi-trash" severity="danger" [outlined]="true" (onClick)="removeLineItem(i)"></p-button>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="summary">
            <div class="flex justify-content-end">
              <span class="text-xl font-bold">Total: ${{ getTotal() | number:'1.2-2' }}</span>
            </div>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="7" class="text-center">Agregue productos a la orden</td>
            </tr>
          </ng-template>
        </p-table>
      </div>

      <div class="flex justify-content-end mt-3">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" class="mr-2" (onClick)="router.navigate(['/orders/history'])"></p-button>
        <p-button label="Crear Orden" type="submit" [disabled]="orderForm.invalid || orderDetails.length === 0"></p-button>
      </div>
    </form>
  </p-card>
</div>
