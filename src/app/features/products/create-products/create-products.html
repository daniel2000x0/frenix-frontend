<div class="p-4">
  <p-card header="Crear Producto">
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" autocomplete="off" novalidate>
      <div class="grid">
        <div class="col-12 md:col-6 field">
          <label for="productsku">SKU</label>
          <input id="productsku" pInputText formControlName="productsku" class="w-full" />
          <small class="error" *ngIf="productForm.get('productsku')?.touched && productForm.get('productsku')?.invalid">
            SKU requerido
          </small>
        </div>

        <div class="col-12 md:col-6 field">
          <label for="productname">Nombre</label>
          <input id="productname" pInputText formControlName="productname" class="w-full" />
          <small class="error" *ngIf="productForm.get('productname')?.touched && productForm.get('productname')?.invalid">
            Nombre requerido
          </small>
        </div>

        <div class="col-12 md:col-4 field">
          <label for="productprice">Precio</label>
          <p-inputNumber id="productprice" formControlName="productprice" [min]="0" mode="currency" currency="USD" locale="en-US" class="w-full"></p-inputNumber>
          <small class="error" *ngIf="productForm.get('productprice')?.touched && productForm.get('productprice')?.invalid">
            Precio requerido
          </small>
        </div>

        <div class="col-12 md:col-4 field">
          <label for="productquantity">Cantidad</label>
          <p-inputNumber id="productquantity" formControlName="productquantity" [min]="0" class="w-full"></p-inputNumber>
          <small class="error" *ngIf="productForm.get('productquantity')?.touched && productForm.get('productquantity')?.invalid">
            Cantidad requerida
          </small>
        </div>

        <div class="col-12 md:col-4 field">
          <label for="productcategory">Categoría</label>
          <p-select id="productcategory" formControlName="productcategory" [options]="categories" optionLabel="categoryname" optionValue="categoryid" placeholder="Seleccione una categoría" class="w-full"></p-select>
          <small class="error" *ngIf="productForm.get('productcategory')?.touched && productForm.get('productcategory')?.invalid">
            Categoría requerida
          </small>
        </div>

        <div class="col-12 md:col-4 field">
          <label for="productmanufacture">Fabricante</label>
          <p-inputNumber id="productmanufacture" formControlName="productmanufacture" class="w-full"></p-inputNumber>
          <small class="error" *ngIf="productForm.get('productmanufacture')?.touched && productForm.get('productmanufacture')?.invalid">
            Fabricante requerido
          </small>
        </div>

        <div class="col-12 field">
          <label for="productdescription">Descripción</label>
          <textarea id="productdescription" formControlName="productdescription" class="w-full" rows="4"></textarea>
        </div>
      </div>

      <div class="flex justify-content-end gap-2 mt-3">
        <p-button label="Cancelar" severity="secondary" type="button" (onClick)="onCancel()"></p-button>
        <p-button label="Guardar" type="submit" [loading]="loading" [disabled]="productForm.invalid || loading"></p-button>
      </div>
    </form>
  </p-card>
</div>
