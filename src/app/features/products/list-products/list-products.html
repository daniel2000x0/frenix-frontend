<div class="p-4">
  <p-card header="Productos">
    <div class="flex justify-content-between align-items-center mb-3">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar producto..." />
      </span>
      <p-button label="Nuevo producto" icon="pi pi-plus" (onClick)="createProduct()"></p-button>
    </div>

    <p-table
      #dt
      [value]="products"
      [paginator]="true"
      [rows]="10"
      [globalFilterFields]="['productname', 'productsku']"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>SKU</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Cantidad</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{ product.productsku }}</td>
          <td>{{ product.productname }}</td>
          <td>${{ product.productprice }}</td>
          <td>{{ product.productquantity }}</td>
          <td>
            <p-tag
              [value]="getInventoryLabel(product.productquantity)"
              [severity]="getSeverity(product.productquantity)"
            />
          </td>
          <td>
            <p-button icon="pi pi-eye" severity="info" [outlined]="true" (onClick)="viewProduct(product.productid)" class="mr-2"></p-button>
            <p-button icon="pi pi-pencil" severity="secondary" [outlined]="true" (onClick)="editProduct(product.productid)"></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center">No hay productos disponibles</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
